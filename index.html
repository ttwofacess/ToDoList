<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-key="pageTitle">To-Do List</title>

    <link rel="icon" href="./assets/favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="./js/main.js" type="module"></script>
</head>
<body>
    <div class="list roundBorder">
        <div class="date">
            <div class="dateLeft">
                <div id="dateNumber"></div>
                <div>
                    <div id="dateMonth"></div>
                    <div id="dateYear"></div>
                </div>
            </div>
            <div id="dateText"></div>
        </div>
        <form>
            <input type="text" name="taskText" autocomplete="off" placeholder="New Task" class="roundBorder" data-i18n-key="taskPlaceholder">
            <div class="priority-wrapper">
                <label for="taskPriority" data-i18n-key="priorityLabel">Prioridad:</label>
                <select name="taskPriority" id="taskPriority" class="roundBorder">
                    <option value="high" data-i18n-key="priorityHigh">High</option>
                    <option value="medium" selected data-i18n-key="priorityMedium">Medium</option>
                    <option value="low" data-i18n-key="priorityLow">Low</option>
                </select>
            </div>
            <div class="date-wrapper">
                <label for="taskDate" data-i18n-key="dateLabel">Fecha:</label>
                <input type="date" name="taskDate" id="taskDate" class="roundBorder" data-i18n-key="datePlaceholder" required>
            </div>
            <button type="submit" class="addTaskButton">+</button>
        </form>
        <div class="orderButton-wrapper">
            <button type="button" class="orderButton roundBorder" data-i18n-key="orderButton">Order</button>
            <button type="button" class="filterButton roundBorder" data-i18n-key="filterButtonToday">Focus Mode</button>
        </div>
        <div class="actions-wrapper">
            <button type="button" class="actionButton roundBorder" data-action="export" data-i18n-key="exportButton">Export</button>
            <button type="button" class="actionButton roundBorder" onclick="document.getElementById('importInput').click()" data-i18n-key="importButton">Import</button>
            <input type="file" id="importInput" accept=".json" style="display: none;">
        </div>
        <div id="tasksContainer"></div>
        <div class="donate-wrapper">
            <button type="button" id="donateButton" class="roundBorder" data-i18n-key="donateButton">Donate</button>
        </div>
    </div>

    <div id="donateModal" class="modal">
        <div class="modal-content roundBorder">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="donateTitle">Donate</h2>
            <div class="crypto-options">
                <div class="crypto-option">
                    <div class="crypto-icon">₿</div>
                    <div class="crypto-info">
                        <span class="crypto-name">Bitcoin</span>
                        <input type="text" value="bc1qxz4nxj8rzxzsnwj8u4rq46wy8dnf5h7yvzaqs2" readonly>
                    </div>
                    <button class="copy-button" data-i18n-key="copyButton">Copy</button>
                </div>
                <div class="crypto-option">
                    <div class="crypto-icon">Ł</div>
                    <div class="crypto-info">
                        <span class="crypto-name">Litecoin</span>
                        <input type="text" value="M8snytUjZP13KVTEHA4JCbHfy31Ve2xMr4" readonly>
                    </div>
                    <button class="copy-button" data-i18n-key="copyButton">Copy</button>
                </div>
                <div class="crypto-option">
                    <div class="crypto-icon">$</div>
                    <div class="crypto-info">
                        <span class="crypto-name">USDT (TRC20)</span>
                        <input type="text" value="TYsPkPyHbWN8cPuoDA7DohwhAdXWkVbQHm" readonly>
                    </div>
                    <button class="copy-button" data-i18n-key="copyButton">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content roundBorder">
            <span class="close-button" id="closeEditModal">&times;</span>
            <h2 data-i18n-key="editTaskTitle">Edit Task</h2>
            <form id="editTaskForm">
                <input type="text" id="editTaskText" placeholder="Task text" class="roundBorder" data-i18n-key="taskPlaceholder">
                
                <div class="priority-wrapper">
                    <label for="editTaskPriority" data-i18n-key="priorityLabel">Priority:</label>
                    <select id="editTaskPriority" class="roundBorder">
                        <option value="high" data-i18n-key="priorityHigh">High</option>
                        <option value="medium" data-i18n-key="priorityMedium">Medium</option>
                        <option value="low" data-i18n-key="priorityLow">Low</option>
                    </select>
                </div>
                
                <div class="date-wrapper">
                    <label for="editTaskDate" data-i18n-key="dateLabel">Date:</label>
                    <input type="date" id="editTaskDate" class="roundBorder" required>
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="orderButton roundBorder" data-i18n-key="saveButton">Save</button>
                    <button type="button" id="cancelEditButton" class="filterButton roundBorder" data-i18n-key="cancelButton">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
